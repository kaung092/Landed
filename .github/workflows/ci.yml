name: CI

# The automated feedback signal, enforced on every change. Both jobs are hard gates — they must be
# green to merge. `check` = typecheck + tests; `lint` = eslint (the react-hooks backlog is cleared,
# so lint now blocks too). A pre-push hook (.githooks/pre-push) runs both locally before every push.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
